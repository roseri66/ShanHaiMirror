[/Script/GameplayTags.GameplayTagsSettings]
ImportTagsFromConfig=True
WarnOnInvalidTags=True
ClearInvalidTags=False
AllowEditorTagUnloading=True
AllowGameTagUnloading=False
FastReplication=False
InvalidTagCharacters="\"\',"

; ============================================================================
; 标签唯一来源原则
;
; 已在 C++ 用 UE_DEFINE_GAMEPLAY_TAG 声明的标签（见 Framework/SHMGameplayTags.h）
; 一律不在本文件重复声明，避免两处定义漂移。
; 本文件只保留「尚未 native 化」的标签——多是后续 Sprint 才用到的。
;
; 新增标签时的判断：
;   C++ 代码要引用它   → 加到 SHMGameplayTags.h/.cpp，不要加这里
;   只有资产/数据表引用 → 加这里
;
; 注：原 Event.Combat.OnXxx 系列已随事件总线类型化改造移除，
;     新事件标签为 Event.Combat.Xxx / Event.Flow.Xxx，均为 native。
; ============================================================================

; --- 敌人原型（Grunt/Tank/Rush/Shooter 已 native 化）---
+GameplayTagList=(Tag="Enemy.Controller",DevComment="控制（OUT OF SCOPE，见 DECISIONS D-05）")
+GameplayTagList=(Tag="Enemy.Support",DevComment="辅助（OUT OF SCOPE，见 DECISIONS D-05）")
+GameplayTagList=(Tag="Enemy.Elite",DevComment="精英（OUT OF SCOPE，见 DECISIONS D-05）")
+GameplayTagList=(Tag="Enemy.Boss",DevComment="Boss（OUT OF SCOPE，见 DECISIONS D-04）")

; --- 武器（Sword/Bow 已 native 化）---
+GameplayTagList=(Tag="Weapon.Mirror",DevComment="卦镜（后续）")
+GameplayTagList=(Tag="Weapon.Talisman",DevComment="符箓（后续）")

; --- 规则修改器（W2 DirectorCore 消费，届时按需 native 化）---
+GameplayTagList=(Tag="Rule.Ammo",DevComment="弹药掉落率")
+GameplayTagList=(Tag="Rule.Heal",DevComment="回复道具效果")
+GameplayTagList=(Tag="Rule.Cooldown",DevComment="技能冷却")
+GameplayTagList=(Tag="Rule.Crit",DevComment="暴击率")
+GameplayTagList=(Tag="Rule.MeleeDamage",DevComment="近战伤害倍率")
+GameplayTagList=(Tag="Rule.RangedDamage",DevComment="远程伤害倍率")

; --- 资源分布 ---
+GameplayTagList=(Tag="Resource.Heal",DevComment="治疗道具掉落")

; --- Build 流派（Melee/Ranged 已 native 化）---
+GameplayTagList=(Tag="Build.Crit",DevComment="暴击流（后续）")

; --- 战场偏好（OUT OF SCOPE，见 DECISIONS D-11：需要多套房间几何）---
+GameplayTagList=(Tag="Arena.Open",DevComment="开阔战场（保留字段，v1 不消费）")
+GameplayTagList=(Tag="Arena.Cover",DevComment="掩体战场（保留字段，v1 不消费）")
